name = "Arduino"
grammar = "arduino"
path_suffixes = ["ino", "pde"]
word_characters = ["_"]
line_comments = ["// ", "/// ", "//! "]
block_comment = ["/* ", " */"]
autoclose_before = ";:.,=}])>"
brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false, not_in = [
    "string",
  ] },
  { start = "'", end = "'", close = true, newline = false, not_in = [
    "string",
    "comment",
  ] },
  { start = "/*", end = "*/", close = true, newline = false, not_in = [
    "string",
    "comment",
  ] },
]
